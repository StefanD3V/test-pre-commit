name: CI

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
  push:
    branches:
      - develop
      - staging
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  test:
    name: test
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: aviana
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: aviana
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            libpq-dev \
            binutils \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1000291963486/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@datablooz-k8s-cluster.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push
        run: |
          docker build -t europe-west1-docker.pkg.dev/datablooz-k8s-cluster/datablooz/aviana:${{ github.sha }} \
                        -t europe-west1-docker.pkg.dev/datablooz-k8s-cluster/datablooz/aviana:latest .
          docker push europe-west1-docker.pkg.dev/datablooz-k8s-cluster/datablooz/aviana:${{ github.sha }}
          docker push europe-west1-docker.pkg.dev/datablooz-k8s-cluster/datablooz/aviana:latest