repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: django-tests
        name: django manage.py test
        entry: .venv/bin/python
        args: [manage.py, test]
        language: system
        pass_filenames: false
        stages: [pre-push]
