repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: django-tests
        name: django manage.py test in docker
        entry: docker
        args: [compose, exec, -T, web, python, manage.py, test]
        language: system
        pass_filenames: false
        stages: [pre-push]
